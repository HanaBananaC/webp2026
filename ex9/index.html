<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 9 - Flickr API</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      margin: 20px;
    }

    button {
      padding: 8px 16px;
      font-size: 16px;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .gallery {
      --g: 6px; /* the gap */

      display: grid;
      width: 1200px; /* the size */
      max-width: 100%;
      aspect-ratio: 1;
      grid: auto-flow 1fr / repeat(3, 1fr);
      gap: var(--g);
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(1);
      cursor: pointer;
      transition: 0.5s;
    }

    .gallery img:hover {
      filter: grayscale(0);
    }

    .gallery img:nth-child(2) {
      grid-area: 1 / 2 / span 2 / span 2;
      clip-path: polygon(
        0 0,
        100% 0,
        100% 100%,
        calc(50% + var(--g) / 4) 100%,
        0 calc(50% - var(--g) / 4)
      );
    }

    .gallery img:nth-child(3) {
      grid-area: 2 / 1 / span 2 / span 2;
      clip-path: polygon(
        0 0,
        calc(50% - var(--g) / 4) 0,
        100% calc(50% + var(--g) / 4),
        100% 100%,
        0 100%
      );
    }

    #msg {
      color: #c00;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <button onclick="getImg()">Get IMG</button>
  <div id="gallery" class="gallery"></div>
  <div id="msg"></div>

  <script src="main.js"></script>
</body>
</html>
