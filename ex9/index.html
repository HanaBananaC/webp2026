<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ex9 Flickr Photo Wall</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    button {
      padding: 8px 16px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    #status {
      margin: 10px 0 20px 0;
      color: #444;
    }

    .gallery {
      --g: 6px; /* the gap */
      display: grid;
      width: 1200px; /* the size */
      max-width: 95vw;
      aspect-ratio: 1;
      grid: auto-flow 1fr / repeat(3, 1fr);
      gap: var(--g);
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale();
      cursor: pointer;
      transition: .5s;
    }

    .gallery img:hover {
      filter: grayscale(0);
    }

    .gallery img:nth-child(2) {
      grid-area: 1 / 2 / span 2 / span 2;
      clip-path: polygon(
        0 0,
        100% 0,
        100% 100%,
        calc(50% + var(--g)/4) 100%,
        0 calc(50% - var(--g)/4)
      );
    }

    .gallery img:nth-child(3) {
      grid-area: 2 / 1 / span 2 / span 2;
      clip-path: polygon(
        0 0,
        calc(50% - var(--g)/4) 0,
        100% calc(50% + var(--g)/4),
        100% 100%,
        0 100%
      );
    }
  </style>
</head>
<body>
  <button onclick="getimg()">Get IMG</button>
  <div id="status">按下按鈕後讀取 Flickr 圖片</div>
  <div id="gallery" class="gallery"></div>

  <script src="script.js"></script>
</body>
</html>
